<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>よゆうシミュ — ライフプランを作ろう</title>
<!-- v4: リベ大式ライフプラン3資料（収支表&BS・ライフイベント表・キャッシュフロー表）＋作成4STEP -->
<style>
:root{
  --bg:#fdf6e6; --card:#fffdf7; --line:#f0e2c4; --ink:#4a3b26; --sub:#a08d6a;
  --orange:#f39c12; --orange-d:#d9820a; --green:#4a9e5c; --red:#d9534f; --blue:#4a7fb5;
  --radius:16px; --shadow:0 2px 10px rgba(160,120,40,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.75;padding-bottom:84px}
header{background:linear-gradient(135deg,#f9b234,#f39c12);color:#fff;padding:14px 16px 12px;box-shadow:var(--shadow)}
header h1{font-size:1.05rem;font-weight:900;letter-spacing:.02em}
header .sub{font-size:.68rem;opacity:.92}
#auth{font-size:.72rem;margin-top:4px}
.wrap{max-width:820px;margin:0 auto;padding:14px 14px 30px}
h2{font-size:1.02rem;font-weight:900;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
h2 .no{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:16px;margin:10px 0;box-shadow:var(--shadow)}
.card h3{font-size:.9rem;font-weight:900;margin-bottom:8px}
.note{font-size:.72rem;color:var(--sub);line-height:1.6}
.pill{display:inline-block;border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:5px 14px;font-size:.8rem;font-weight:700;cursor:pointer;margin:2px}
.pill.on{background:var(--orange);border-color:var(--orange);color:#fff}
button.act{background:var(--orange);color:#fff;border:none;border-radius:12px;font:inherit;font-weight:900;font-size:.88rem;padding:10px 20px;cursor:pointer;box-shadow:0 2px 0 var(--orange-d)}
button.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);border-radius:12px;font:inherit;font-weight:700;font-size:.8rem;padding:7px 14px;cursor:pointer}
button.mini{background:none;border:none;color:var(--sub);cursor:pointer;font-size:.85rem;padding:2px 6px}
input,select,textarea{font:inherit;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:7px 10px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange)}
input[type=number]{width:92px;text-align:right}
label.fl{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;font-size:.85rem;font-weight:700;flex-wrap:wrap}
label.fl .u{font-size:.72rem;color:var(--sub);font-weight:400}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.kpi{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
.kpi .t{font-size:.68rem;color:var(--sub);font-weight:700}
.kpi .v{font-size:1.3rem;font-weight:900;line-height:1.3}
.kpi .v.ok{color:var(--green)} .kpi .v.ng{color:var(--red)}
.kpi .s{font-size:.66rem;color:var(--sub)}
/* 遭難アラート */
.sos{background:#fdecea;border:2px solid var(--red);border-radius:var(--radius);padding:12px 16px;margin:10px 0;font-size:.85rem;font-weight:700;color:#a33}
.safe{background:#edf7ee;border:1.5px solid var(--green);border-radius:var(--radius);padding:10px 16px;margin:10px 0;font-size:.82rem;font-weight:700;color:#2e6b3e}
/* 進捗 */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stepbox{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer}
.stepbox.done{border-color:var(--green);background:#f2faf3}
.stepbox .n{width:24px;height:24px;border-radius:50%;background:var(--orange);color:#fff;font-weight:900;font-size:.8rem;display:inline-flex;align-items:center;justify-content:center}
.stepbox.done .n{background:var(--green)}
.stepbox .t{font-size:.66rem;font-weight:700;margin-top:4px;line-height:1.4}
/* テーブル */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1.5px solid var(--line);border-radius:12px;background:#fff}
table{border-collapse:collapse;width:100%;font-size:.78rem;min-width:520px}
th{background:#faf3df;font-size:.68rem;color:#8a744d;padding:7px 8px;text-align:right;white-space:nowrap;position:sticky;top:0}
th:first-child,td:first-child{text-align:left}
td{padding:6px 8px;border-top:1px solid var(--line);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
tr.neg td{background:#fdecea}
tr.ev td{color:var(--blue)}
td.minus{color:var(--red);font-weight:700}
td.plus{color:var(--green)}
/* 収支リスト（MF実績・直近12ヶ月） */
.mflist td:first-child,.mflist th:first-child{position:sticky;left:0;background:#fff;z-index:2;min-width:96px;box-shadow:1px 0 0 var(--line)}
.mflist th:first-child{background:#faf3df}
.mflist tr.inc-row td{background:#e7f2fb;font-weight:900}
.mflist tr.inc-row td:first-child{background:#e7f2fb}
.mflist tr.exp-row td{background:#fdebd3;font-weight:900}
.mflist tr.exp-row td:first-child{background:#fdebd3}
.mflist tr.sum-row td{background:#f7f2e2;font-weight:900;border-top:2px solid var(--line)}
.mflist tr.sum-row td:first-child{background:#f7f2e2}
/* 収支バー */
.bar{height:12px;border-radius:99px;background:#f2e6c8;overflow:hidden;display:flex}
.bar i{display:block;height:100%}
/* イベントカード */
.evrow{display:flex;gap:8px;align-items:center;padding:8px 4px;border-top:1px dashed var(--line);font-size:.82rem;flex-wrap:wrap}
.evrow .yr{font-weight:900;color:var(--orange-d);min-width:88px}
.evrow .nm{flex:1;font-weight:700;min-width:120px}
.evrow .amt{font-weight:900}
.evrow .amt.exp{color:var(--red)} .evrow .amt.inc{color:var(--green)}
/* MFドロップ */
#mfdrop{border:2px dashed var(--orange);border-radius:12px;padding:16px;text-align:center;font-size:.8rem;color:var(--sub);cursor:pointer;background:#fffaf0}
#mfdrop.on{background:#fdeecd}
/* 下部ナビ */
nav#tabs{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1.5px solid var(--line);display:flex;z-index:50;box-shadow:0 -2px 10px rgba(160,120,40,.10)}
nav#tabs button{flex:1;background:none;border:none;font:inherit;padding:9px 2px 10px;cursor:pointer;color:var(--sub);font-size:.62rem;font-weight:700;line-height:1.5}
nav#tabs button .ic{display:block;font-size:1.15rem}
nav#tabs button.on{color:var(--orange-d)}
canvas{width:100%;height:auto;display:block}
footer{color:var(--sub);font-size:.66rem;text-align:center;margin:26px 12px 10px;line-height:1.7}
.chips{display:flex;flex-wrap:wrap;gap:4px}
dialog{border:1.5px solid var(--line);border-radius:var(--radius);padding:18px;max-width:420px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.2)}
dialog::backdrop{background:rgba(74,59,38,.35)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
.vision{background:#fffef2;border:1.5px solid #f3df9a;border-radius:var(--radius);padding:12px 16px;font-size:.85rem;white-space:pre-wrap}
</style>
</head>
<body>

<header>
  <h1>💰 よゆうシミュ <span style="font-weight:600;font-size:.78rem">— ライフプランを作ろう</span></h1>
  <div class="sub">3つの資料（収支表&バランスシート・ライフイベント表・キャッシュフロー表）を4ステップで。答えも決まったフォーマットもない — 理想の人生から設計しよう</div>
  <div id="auth"></div>
</header>

<div class="wrap"><div id="main"></div>
<footer>
  金額はすべて概算・万円単位。保育料=名古屋市R7公式表（多子軽減込み）/知立市R8公式表・他市は概算。教育費=文科省「子供の学習費調査」ベース。<br>
  データはこの端末（ログイン時はあなたのGoogleアカウントのクラウド）にのみ保存。将来を保証するものではありません。
</footer>
</div>

<nav id="tabs">
  <button data-tab="home"><span class="ic">🏠</span>ホーム</button>
  <button data-tab="s1"><span class="ic">📝</span>①生き方</button>
  <button data-tab="s2"><span class="ic">⚖️</span>②収支&BS</button>
  <button data-tab="s3"><span class="ic">🎪</span>③イベント</button>
  <button data-tab="s4"><span class="ic">📈</span>④CF表</button>
</nav>

<script>
"use strict";
/* ══════════════ 状態（v4スキーマ） ══════════════ */
const BLANK = () => ({
  setup:false, updatedAt:0,
  step1:{ vision:"" },
  family:{
    me:{birth:"1990-01", retire:60, pension:20},
    spouse:{enabled:true, birth:"1992-01", work:"ikukyunow"}, // full/part/ikukyunow/home
    kids:[]
  },
  city:"名古屋市",
  step2:{
    inc:{meNet:30, meBonus:60, spNet:0, spBonus:0, other:0},
    exp:{}, mf:{},
    assets:[{name:"預金",type:"cash",amount:300},{name:"投資（NISA等）",type:"invest",amount:100}],
    debts:[]
  },
  step3:{ events:[] },
  step4:{ rate:3, goal:0, wifInc:0, wifExp:0 }
});
let V = BLANK();
try{ const s=JSON.parse(localStorage.getItem('yoyu_v4')||'null'); if(s&&s.step1) V=Object.assign(BLANK(),s); }catch(e){}
let TAB='home';

function save(){ V.setup=true; V.updatedAt=Date.now(); localStorage.setItem('yoyu_v4',JSON.stringify(V)); if(window.cloudPush) window.cloudPush(V); }
window.applyCloud = s=>{ if(s&&s.step1){ V=Object.assign(BLANK(),s); localStorage.setItem('yoyu_v4',JSON.stringify(V)); render(); } };

/* ══════════════ 共通ヘルパ ══════════════ */
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const man=v=>(v<0?'-':'')+Math.abs(Math.round(v*10)/10).toLocaleString()+'万';
const manInt=v=>(v<0?'-':'')+Math.abs(Math.round(v)).toLocaleString()+'万';
function ageFrom(b){ if(!b) return 0; const [y,m]=b.split('-').map(Number); const n=new Date(); let a=n.getFullYear()-y; if(n.getMonth()+1<(m||1)) a--; return a; }
const thisYear=new Date().getFullYear();

/* ══════════════ 収支・BS 計算 ══════════════ */
const EXP_CATS=["住居費","食費","水道光熱費","通信費","保険","車","日用品","趣味・娯楽","衣服・美容","交際費","その他"];
function mfAvgInc(){ const ms=Object.keys(V.step2.mf).sort().slice(-6); if(!ms.length) return null; return Math.round(ms.reduce((s,m)=>s+(V.step2.mf[m].inc||0),0)/ms.length/1000)/10; }
function manualIncM(){ const i=V.step2.inc; const sp=(V.family.spouse.enabled&&(V.family.spouse.work==='full'||V.family.spouse.work==='part'))?(+i.spNet||0):0; return (+i.meNet||0)+sp+(+i.other||0); }
function incomeMonthly(){ if(V.step2.incMode==='mf'&&mfAvgInc()!=null) return mfAvgInc(); return manualIncM(); }
function incomeAnnual(){ const i=V.step2.inc;
  if(V.step2.incMode==='mf'&&mfAvgInc()!=null) return mfAvgInc()*12;  // MF実績は賞与月も平均に含まれる
  return manualIncM()*12+(+i.meBonus||0)+((V.family.spouse.enabled&&(V.family.spouse.work==='full'||V.family.spouse.work==='part'))?(+i.spBonus||0):0); }
function expenseMonthly(){ return EXP_CATS.reduce((s,c)=>s+(+V.step2.exp[c]||0),0); }
function assetsFin(){ return V.step2.assets.filter(a=>a.type==='cash'||a.type==='invest').reduce((s,a)=>s+(+a.amount||0),0); }
function assetsAll(){ return V.step2.assets.reduce((s,a)=>s+(+a.amount||0),0); }
function debtsAll(){ return V.step2.debts.reduce((s,d)=>s+(+d.amount||0),0); }
function netWorth(){ return assetsAll()-debtsAll(); }
function monthlyBalance(){ return incomeMonthly()-expenseMonthly()-kidsCostNow(); }
/* MF月平均（直近6ヶ月・大項目→11カテゴリへ寄せ） */
const MF_MAP={"住宅":"住居費","食費":"食費","水道・光熱費":"水道光熱費","通信費":"通信費","保険":"保険","自動車":"車","日用品":"日用品","趣味・娯楽":"趣味・娯楽","衣服・美容":"衣服・美容","交際費":"交際費"};
function mfAvgByCat(){
  const ms=Object.keys(V.step2.mf).sort().slice(-6); if(!ms.length) return null;
  const sum={};
  ms.forEach(m=>{ const cs=V.step2.mf[m].cats||{}; for(const [c,v] of Object.entries(cs)){ const k=MF_MAP[c]||"その他"; sum[k]=(sum[k]||0)+v; } });
  const out={}; for(const [k,v] of Object.entries(sum)) out[k]=Math.round(v/ms.length/1000)/10; // 円→万円
  return {months:ms.length, cats:out};
}

/* ── 収支リスト（MF実績・直近12ヶ月・マネフォ風） ── */
function mfListHTML(){
  const ms=Object.keys(V.step2.mf).sort().slice(-12);
  if(!ms.length) return '';
  const yen0=v=>Math.round(v).toLocaleString()+'円';
  const cats=[...new Set(ms.flatMap(m=>Object.keys(V.step2.mf[m].cats||{})))];
  cats.sort((a,b)=>ms.reduce((s2,m)=>s2+((V.step2.mf[m].cats||{})[b]||0),0)-ms.reduce((s2,m)=>s2+((V.step2.mf[m].cats||{})[a]||0),0));
  const expOf=m=>Object.values(V.step2.mf[m].cats||{}).reduce((a,b)=>a+b,0);
  return `<div class="card">
    <h3>📊 収支リスト（直近${ms.length}ヶ月・マネーフォワード実績）</h3>
    <div class="twrap"><table class="mflist" style="min-width:${140+ms.length*104}px">
      <thead><tr><th></th>${ms.map(m=>`<th>${m.replace('-','/')}</th>`).join('')}</tr></thead>
      <tbody>
        <tr class="inc-row"><td>収入合計</td>${ms.map(m=>`<td>${yen0(V.step2.mf[m].inc||0)}</td>`).join('')}</tr>
        <tr class="exp-row"><td>支出合計</td>${ms.map(m=>`<td>${yen0(expOf(m))}</td>`).join('')}</tr>
        ${cats.map(c=>`<tr><td>${esc(c)}</td>${ms.map(m=>{const v=(V.step2.mf[m].cats||{})[c]||0;return `<td>${v?yen0(v):'0円'}</td>`;}).join('')}</tr>`).join('')}
        <tr class="sum-row"><td>収支合計</td>${ms.map(m=>{const d=(V.step2.mf[m].inc||0)-expOf(m);return `<td class="${d<0?'minus':''}">${yen0(d)}</td>`;}).join('')}</tr>
      </tbody>
    </table></div>
    <div class="note">CSVを追加ドロップすると月が増えます（同じ月は上書き）。カテゴリはマネーフォワードの大項目のまま表示。</div>
  </div>`;
}

/* ══════════════ 保育料エンジン（v3から移植） ══════════════ */
/* 出典: 名古屋市 令和7年度 利用者負担額基準月額表（3歳未満児・標準時間・税源移譲前所得割で判定）
        知立市 令和8年度 入所案内（D階層・現行の市民税所得割で判定・上限46,000円） */
const NAGOYA_TIERS=[[10000,6400],[40800,7500],[43800,11200],[55200,13900],[67000,17500],[88800,22100],[110000,25800],[131600,29400],[180000,34900],[236800,42700],[281000,50300],[351500,58300],[411800,63400],[518000,63900],[Infinity,64000]];
const CHIRYU_TIERS=[[48600,19000],[97000,30000],[133000,36000],[185700,42000],[257500,45600],[Infinity,46000]]; // 下位帯は【概算】・D13/D14は市公式
const HOIKU_OTHER=[[330,1.5],[470,2.5],[640,3.5],[930,4.5],[9999,5.3]];
function kyuyoKojo(g){ if(g<=162.5)return 55; if(g<=180)return g*.4-10; if(g<=360)return g*.3+8; if(g<=660)return g*.2+44; if(g<=850)return g*.1+110; return 195; }
function incomeTaxMan(k){ const b=[[195,.05,0],[330,.10,9.75],[695,.20,42.75],[900,.23,63.6],[1800,.33,153.6],[4000,.40,279.6],[Infinity,.45,479.6]]; for(const [c,r,d] of b) if(k<=c) return Math.max(0,k*r-d); return 0; }
function netFromGrossMan(g){ const ks=Math.max(0,g-kyuyoKojo(g)),sh=g*.145; const tax=incomeTaxMan(Math.max(0,ks-sh-48))*1.021; const jm=Math.max(0,ks-sh-43)*.10+.5; return g-sh-tax-jm; }
function grossFromNetMan(net){ if(net<=0)return 0; let lo=net,hi=net*1.7+50; for(let i=0;i<40;i++){const m=(lo+hi)/2; if(netFromGrossMan(m)<net)lo=m; else hi=m;} return (lo+hi)/2; }
function shotokuwariYen(netAnnualMan, pre){ // pre=true: 税源移譲前3/8/10%（名古屋） false: 現行6%（知立ほか）
  if(netAnnualMan<=0) return 0;
  const g=grossFromNetMan(netAnnualMan);
  const kazei=Math.max(0,g-kyuyoKojo(g)-g*.145-43);
  if(!pre) return Math.round(kazei*.06*10000);
  let z=Math.min(kazei,200)*.03; if(kazei>200)z+=Math.min(kazei-200,500)*.08; if(kazei>700)z+=(kazei-700)*.10;
  return Math.round(z*10000);
}
function householdSW(pre){
  const i=V.step2.inc;
  let sw=shotokuwariYen((+i.meNet||0)*12+(+i.meBonus||0), pre);
  if(V.family.spouse.enabled&&(V.family.spouse.work==='full'||V.family.spouse.work==='part')) sw+=shotokuwariYen((+i.spNet||0)*12+(+i.spBonus||0), pre);
  return sw;
}
function ninkaFee(kidIndex, preRank, totalKids){ // 月額(万円)
  const city=V.city;
  if(totalKids>=3&&kidIndex>=2) return 0;                      // 第3子以降無料（名古屋③/知立とも）
  let base;
  if(city==='名古屋市'){
    const sw=householdSW(true);
    base=64000; for(const [cap,v] of NAGOYA_TIERS){ if(sw<cap){ base=v; break; } }
    if(sw<57700){ if(kidIndex>=2) base=0; else if(kidIndex>=1) base=Math.round(base/2); }  // ①多子世帯軽減（年齢問わず）
    else { if(preRank>=2) base=0; else if(preRank>=1) base=Math.round(base/2); }           // ②同時利用軽減（就学前同時のみ）
    return base/10000;
  }
  if(city==='知立市'){
    const sw=householdSW(false);
    base=46000; for(const [cap,v] of CHIRYU_TIERS){ if(sw<cap){ base=v; break; } }
    if(preRank>=2) base=0; else if(preRank>=1) base=Math.round(base/2); // 同時就園第2子半額
    return base/10000;
  }
  const netA=incomeAnnual();
  let f=HOIKU_OTHER[HOIKU_OTHER.length-1][1];
  for(const [cap,v] of HOIKU_OTHER){ if(netA<=cap){ f=v; break; } }
  if(preRank>=2) f=0; else if(preRank>=1) f*=0.5;
  return f;
}
/* 教育費（文科省 学習費調査ベースの丸め・万円/月。大・院は総額を18歳まで積立） */
const STAGE_COST={sho:{pub:1.2,pri:5.5},chu:{pub:1.8,pri:4.5},kou:{pub:2.5,pri:4.5},dai:{none:0,pub:450,pri:700},grad:{none:0,pub:150,pri:250}};
const DEFAULT_STAGES={sho:'pub',chu:'pub',kou:'pub',dai:'pub',grad:'none'};
function kidCostAt(k, kidAge, kidIndex, kidsAgesNow){
  if(kidAge<0) return 0;
  const st=k.stages||DEFAULT_STAGES;
  if(kidAge<=2){
    const care=k.care||'ninka';
    if(care==='home') return 0;
    if(care==='ninkagai') return +k.careFee||3.7;             // 企業主導型の地域枠水準を既定に
    const preRank=kidsAgesNow.filter((a,j)=>j<kidIndex&&a>=0&&a<=5).length;
    return ninkaFee(kidIndex, preRank, kidsAgesNow.length);
  }
  if(kidAge<=5) return 0.8;                                    // 無償化後の実費概算
  if(kidAge<=11) return STAGE_COST.sho[st.sho];
  if(kidAge<=14) return STAGE_COST.chu[st.chu];
  if(kidAge<=17) return STAGE_COST.kou[st.kou];
  return 0;
}
function kidEduSave(k,kidAge){
  const st=k.stages||DEFAULT_STAGES;
  if(kidAge>=18) return 0;
  const tot=STAGE_COST.dai[st.dai]+STAGE_COST.grad[st.grad];
  return tot? tot/Math.max(1,18-Math.max(0,kidAge))/12 : 0;
}
function kidsCostNow(){
  const ages=V.family.kids.map(k=>ageFrom(k.birth));
  return V.family.kids.reduce((s,k,i)=>s+kidCostAt(k,ages[i],i,ages)+kidEduSave(k,ages[i]),0);
}

/* ══════════════ キャッシュフロー表エンジン ══════════════ */
function cfRows(ratePct, wif){
  wif=wif||{inc:0,exp:0};
  const r=(ratePct||0)/100;
  const meAge0=ageFrom(V.family.me.birth);
  const kids=V.family.kids;
  let a=assetsFin();
  const rows=[];
  let incAdj=0; // 収入イベント（増減が続くもの）
  for(let off=0; off<=Math.max(0, 95-meAge0); off++){
    const yr=thisYear+off, meAge=meAge0+off;
    const kidsAges=kids.map(k=>ageFrom(k.birth)+off);
    const kidsC=kids.reduce((s,k,i)=>s+kidCostAt(k,kidsAges[i],i,kidsAges)+kidEduSave(k,kidsAges[i]),0);
    let inc, exp;
    if(meAge<(+V.family.me.retire||60)){
      inc=incomeAnnual()/12 + incAdj + (+wif.inc||0);
      exp=expenseMonthly()+kidsC - (+wif.exp||0);
    } else {
      inc=+V.family.me.pension||0;
      exp=expenseMonthly()*0.85+kidsC - (+wif.exp||0);
    }
    let evSum=0, evFlag=false; const evLabels=[];
    for(const ev of V.step3.events){
      const hit = ev.repeat? (yr>=ev.year && (yr-ev.year)%ev.repeat===0 && (!ev.until||yr<=ev.until)) : (ev.year===yr);
      if(!hit) continue;
      if(ev.kind==='incchg'){ incAdj+=(+ev.amount||0); }        // 月収の増減（万/月・以後ずっと）
      else if(ev.kind==='inc'){ evSum+=+ev.amount||0; }         // 一時収入
      else { evSum-=+ev.amount||0; }                            // 一時支出
      evLabels.push(ev.label);
      if(!ev.repeat||ev.repeat>1) evFlag=true;                  // 毎年ものはカーブに旗を立てない
    }
    const flow=(inc-exp)*12+evSum;
    a=a*(1+r)+flow;
    rows.push({yr, meAge, kidsAges, inc:inc*12, exp:exp*12, ev:evSum, evLabels, evFlag, flow, bal:a});
    if(a<-3000) break;
  }
  return rows;
}
function zeroAge(ratePct){ const z=cfRows(ratePct,{inc:+V.step4.wifInc||0,exp:+V.step4.wifExp||0}).find(p=>p.bal<0); return z? z.meAge : null; }

/* ══════════════ MoneyForward CSV取込（v3から移植・端末内処理） ══════════════ */
function splitCSVLine(l){ const out=[]; let cur='',q=false; for(const ch of l){ if(ch==='"'){q=!q;continue;} if(ch===','&&!q){out.push(cur);cur='';continue;} cur+=ch; } out.push(cur); return out; }
async function importMFFiles(files){
  let rows=[];
  for(const f of files){
    const buf=await f.arrayBuffer();
    let txt=new TextDecoder('utf-8').decode(buf);
    if(txt.includes('�')) txt=new TextDecoder('shift_jis').decode(buf);
    txt.split(/\r?\n/).forEach(l=>{ const c=splitCSVLine(l); if(c.length>4) rows.push(c); });
  }
  const head=rows.find(r=>r.some(c=>c.includes('大項目')));
  if(!head) return {err:'CSVの形式が読めません（「大項目」列なし）。マネーフォワードの家計簿エクスポートCSVをご利用ください'};
  const hi={}; head.forEach((c,i)=>hi[c.trim()]=i);
  const di=hi['日付'],ai=hi['金額（円）'],ci=hi['大項目'],ti=hi['計算対象'];
  const agg={};
  for(const r of rows){
    if(r===head) continue;
    const amt=parseFloat((r[ai]||'').replace(/[^\-0-9.]/g,'')); if(!r[di]||isNaN(amt)) continue;
    if(ti!==undefined&&(r[ti]||'').trim()==='0') continue;
    const dm=(r[di]||'').match(/(\d{4})[\/\-](\d{1,2})/); if(!dm) continue;
    const m=dm[1]+'-'+('0'+dm[2]).slice(-2);
    agg[m]=agg[m]||{inc:0,cats:{}};
    if(amt>0){ agg[m].inc+=amt; continue; }
    const cat=(r[ci]||'').trim()||'未分類';
    agg[m].cats[cat]=(agg[m].cats[cat]||0)-amt;
  }
  const ms=Object.keys(agg).sort(); if(!ms.length) return {err:'取り込める行が見つかりませんでした'};
  for(const m of ms){ V.step2.mf[m]={inc:Math.round(agg[m].inc),cats:{}}; for(const [c,v] of Object.entries(agg[m].cats)) V.step2.mf[m].cats[c]=Math.round(v); }
  save();
  return {months:ms};
}

        <span class="amt ${ev.kind==='inc'||ev.kind==='incchg'?'inc':'exp'}">${ev.kind==='incchg'?'月収を':''}<input type="number" style="width:80px" value="${ev.amount}" onchange="V.step3.events[${idx}].amount=+this.value;save();render()">万${ev.kind==='incchg'?'/月 増減（マイナス可）':(ev.kind==='inc'?' 収入':'')}</span>

/* チャート（canvas・3シナリオ） */
function drawCF(){
  const cv=$('cfchart'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const wif={inc:+V.step4.wifInc||0, exp:+V.step4.wifExp||0};
  const series=[{r:1,c:'#d9a05b',w:1.4},{r:5,c:'#7cb98a',w:1.4},{r:3,c:'#f39c12',w:3}].map(s=>({...s,rows:cfRows(s.r,wif)}));
  const all=series.flatMap(s=>s.rows);
  const W=cv.width,H=cv.height,P={l:56,r:12,t:14,b:26};
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#fffdf7'; ctx.fillRect(0,0,W,H);
  const ages=series[2].rows.map(p=>p.meAge);
  const x0=Math.min(...ages), x1=Math.max(...ages);
  let yMax=Math.max(500,...all.map(p=>p.bal)), yMin=Math.min(0,...all.map(p=>p.bal));
  const X=a=>P.l+(a-x0)/(x1-x0||1)*(W-P.l-P.r);
  const Y=v=>P.t+(yMax-v)/(yMax-yMin||1)*(H-P.t-P.b);
  ctx.strokeStyle='#f0e2c4'; ctx.fillStyle='#a08d6a'; ctx.font='11px sans-serif'; ctx.textAlign='right';
  const stepY=Math.pow(10,Math.floor(Math.log10((yMax-yMin)/4||1)));
  for(let v=Math.ceil(yMin/stepY)*stepY; v<=yMax; v+=stepY){ ctx.beginPath(); ctx.moveTo(P.l,Y(v)); ctx.lineTo(W-P.r,Y(v)); ctx.stroke(); ctx.fillText(manInt(v),P.l-6,Y(v)+4); }
  ctx.textAlign='center';
  for(let a=Math.ceil(x0/10)*10;a<=x1;a+=10){ ctx.fillText(a+'歳',X(a),H-8); }
  if(yMin<0){ ctx.fillStyle='rgba(217,83,79,.08)'; ctx.fillRect(P.l,Y(0),W-P.l-P.r,Y(yMin)-Y(0)); }
  ctx.strokeStyle='#d9534f'; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(P.l,Y(0)); ctx.lineTo(W-P.r,Y(0)); ctx.stroke(); ctx.setLineDash([]);
  for(const s of series){
    ctx.strokeStyle=s.c; ctx.lineWidth=s.w; ctx.beginPath();
    s.rows.forEach((p,i)=>{ const x=X(p.meAge),y=Y(Math.max(p.bal,yMin)); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke();
  }
  ctx.lineWidth=1; ctx.fillStyle='#4a7fb5'; ctx.textAlign='center'; ctx.font='12px sans-serif';
  series[2].rows.forEach(p=>{ if(p.evFlag){ ctx.fillText('⚑',X(p.meAge),Y(p.bal)-8); } });
}

/* ══════════════ ナビ・配線 ══════════════ */
function go(t){ TAB=t; render(); window.scrollTo(0,0); }
function render(){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===TAB));
  $('main').innerHTML = TAB==='home'?renderHome():TAB==='s1'?renderS1():TAB==='s2'?renderS2():TAB==='s3'?renderS3():renderS4();
  if(TAB==='s4') drawCF();
  if(TAB==='s2') wireMF();
}
function s1Prompt(p){ const t=$('vision'); t.value=(t.value?t.value+'\n':'')+'■ '+p+'\n'; t.focus(); }
function s1Save(){ V.step1.vision=$('vision').value; save(); $('s1msg').textContent='✅ 保存しました（ホームにも表示されます）'; }
function mfApply(){ const m=mfAvgByCat(); if(!m) return; for(const [k,v] of Object.entries(m.cats)) V.step2.exp[k]=v; if(mfAvgInc()!=null) V.step2.incMode='mf'; save(); render(); }
function wireMF(){
  const drop=$('mfdrop'), file=$('mffile'); if(!drop||drop.dataset.wired) return; drop.dataset.wired='1';
  const handle=async fs=>{ if(!fs||!fs.length) return; $('mfsum').textContent='取込中…';
    const res=await importMFFiles(fs);
    $('mfsum').innerHTML = res.err? '⚠️ '+esc(res.err) : `✅ ${res.months.length}ヶ月分を取込（${res.months[0]}〜${res.months[res.months.length-1]}・収入も集計済み）`;
    if(!res.err) render(); };
  drop.onclick=()=>file.click();
  file.onchange=()=>{ handle(file.files); file.value=''; };
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('on');};
  drop.ondragleave=()=>drop.classList.remove('on');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('on');handle(e.dataTransfer.files);};
}
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>go(b.dataset.tab));
